    {
      "id": "riemann_1859__def_zeta",
      "type": "definition",
      "name": "Riemann Zeta Function",
      "statement": "The zeta function ζ(s) is defined for Re(s) > 1 by the Dirichlet series Σ $n^{-s}$ and extended by analytic continuation to all s ∈ ℂ except s=1.",

    {
      "id": "riemann_1859__thm_euler_product",
      "type": "theorem",
      "name": "Euler Product",
      "statement": "For $\\text{Re}(s) > 1$, $\\zeta(s) = \\prod_p (1 - p^{-s})^{-1}$, the product taken over all primes $p$.",
      "proof_uses": [
        "Riemann Zeta Function"
      ],
      "equivalent_to_RH": false,
      "conditional_on_RH": false,
      "generalises": null,

    {
      "id": "riemann_1859__thm_analytic_continuation",
      "type": "theorem",
      "name": "Analytic Continuation of Zeta",
      "statement": "ζ(s) extends to a meromorphic function on all of ℂ with a single simple pole at s=1 with residue 1.",
      "proof_uses": [
        "Riemann Zeta Function"

      "equivalent_to_RH": false,

    {
      "id": "riemann_1859__thm_functional_equation",
      "type": "theorem",
      "name": "Functional Equation of Zeta",
      "statement": "ζ(s) satisfies $π^{-s/2}$ Γ(s/2) ζ(s) = $π^{-(1-s)/2}$ Γ((1-s)/2) ζ(1-s), relating values at s and 1-s.",
      "proof_uses": [

      "name": "Xi Function",
      "statement": "The xi function ξ(s) = $(1/2)s(s-1)π^{-s/2}$Γ(s/2)ζ(s) is an entire function satisfying ξ(s) = ξ(1-s).",

      "id": "riemann_1859__thm_explicit_formula",
      "type": "theorem",
      "name": "Riemann Explicit Formula",
      "statement": "The prime counting function $\\pi(x)$ is expressed in terms of the non-trivial zeros $\\rho$ of $\\zeta(s)$: $\\pi(x) = \\mathrm{Li}(x) - \\sum_\\rho \\mathrm{Li}(x^\\rho) - \\log 2 + \\int_x^\\infty \\frac{dt}{t(t^2-1)\\log t}$.",

      "type": "theorem",
      "name": "Riemann Zero Counting Formula",
      "statement": "The number N(T) of non-trivial zeros with 0 < Im(ρ) ≤ T is approximately (T/2π)log(T/2π) - T/2π + 7/8 + O(1/T).",

const TYPE_COLORS = {
  theorem:     "#336699",
  lemma:       "#336699",
  corollary:   "#336699",
  proposition: "#31E981",
  definition:  "#E8EEF2",
  conjecture:  "#EF6F6C",
};

const SUBFIELD_COLORS = {
  analytic_NT:             "#336699",
  random_matrix:           "#E8EEF2",
  noncommutative_geometry: "#EF6F6C",
  quantum_chaos:           "#31E981",
  survey:                  "#8b949e",
};

// ── State ──────────────────────────────────────────────────────────
let activeTypes     = new Set(Object.keys(TYPE_COLORS));
let activeSubfields = new Set(Object.keys(SUBFIELD_COLORS));
let selectedNode    = null;
let searchQuery     = "";

// ── SVG + zoom ─────────────────────────────────────────────────────
const svg       = d3.select("#svg");
const container = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.1, 4]).on("zoom", e =>
  container.attr("transform", e.transform)
));

// ── Simulation ─────────────────────────────────────────────────────
const W = document.getElementById("graph-container").clientWidth;
const H = window.innerHeight;

const simulation = d3.forceSimulation()
  .force("link",      d3.forceLink().id(d => d.id).distance(80))
  .force("charge",    d3.forceManyBody().strength(-200))
  .force("center",    d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide().radius(18));

// ── Data prep ──────────────────────────────────────────────────────
const nodeMap    = new Map(GRAPH.nodes.map(n => [n.id, n]));
const validEdges = GRAPH.edges.filter(e => nodeMap.has(e.source) && nodeMap.has(e.target));

GRAPH.nodes.forEach(n => {
  n.connections = validEdges.filter(
    e => e.source === n.id || e.target === n.id
  ).length;
});

let link = container.append("g").selectAll(".link");
let node = container.append("g").selectAll(".node");

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const visibleNodes = GRAPH.nodes.filter(n =>
    activeTypes.has(n.type) && activeSubfields.has(n.subfield || "survey")
  );
  const visibleIds = new Set(visibleNodes.map(n => n.id));
  const getId = d => typeof d === "object" ? d.id : d;

  const visibleEdges = validEdges.filter(e =>
    visibleIds.has(getId(e.source)) && visibleIds.has(getId(e.target))
  );

  link = link.data(visibleEdges, d => getId(d.source) + "_" + getId(d.target) + "_" + d.type);
  link.exit().remove();
  link = link.enter().append("line")
    .attr("class", d => `link ${d.type}`).merge(link);

  node = node.data(visibleNodes, d => d.id);
  node.exit().remove();

  const entered = node.enter().append("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end",   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on("click", (e, d) => selectNode(d));

  entered.append("circle");
  entered.append("text").attr("dy", 18);
  node = entered.merge(node);

  node.select("circle")
    .attr("r",      d => d.id === "RH" ? 16 : 4 + Math.sqrt(d.connections || 0) * 2)
    .attr("fill",   d => TYPE_COLORS[d.type]                       || "#8b949e")
    .attr("stroke", d => SUBFIELD_COLORS[d.subfield || "survey"]   || "#30363d");

  node.select("text")
    .text(d => {
      const s = d.name || d.id.split("__").pop().replace(/_/g, " ");
      if (s.length <= 26) return s;
      const cut = s.lastIndexOf(" ", 24);
      return (cut > 14 ? s.slice(0, cut) : s.slice(0, 24)) + "…";
    });

  applySearch();
  simulation.nodes(visibleNodes);
  simulation.force("link").links(visibleEdges);
  simulation.alpha(0.3).restart();
}

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ── Helpers ────────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Selection ──────────────────────────────────────────────────────
function selectNode(d) {
  selectedNode = d;
  const getId = e => typeof e === "object" ? e.id : e;
  const connected = new Set([d.id]);
  validEdges.forEach(e => {
    if (getId(e.source) === d.id) connected.add(getId(e.target));
    if (getId(e.target) === d.id) connected.add(getId(e.source));
  });

  node.classed("highlighted", n => n.id === d.id)
      .classed("dimmed",      n => !connected.has(n.id));
  link.classed("dimmed", e =>
    getId(e.source) !== d.id && getId(e.target) !== d.id
  );

  const badges = [
    d.equivalent_to_RH  ? `<span class="badge" style="background:#E8EEF222;color:#E8EEF2;border:1px solid #E8EEF2">≡ RH</span>` : "",
    d.conditional_on_RH ? `<span class="badge" style="background:#EF6F6C22;color:#EF6F6C;border:1px solid #EF6F6C">assumes RH</span>` : "",
  ].join("");

  const detail = document.getElementById("detail");
  const meta = PAPER_META[d.paper_id] || {};
  const ref   = d.theorem_ref ? ` — ${d.theorem_ref}` : "";
  const pdfLink = meta.pdf
    ? `<a href="${meta.pdf}" target="_blank"
         title="${meta.title}"
         style="color:#336699;text-decoration:none;border-bottom:1px dotted #336699">
         ${meta.short}${ref} ↗
       </a>`
    : `${meta.short || d.paper_id}${ref}`;

  detail.innerHTML = `
    <h3>${d.name || d.id}</h3>
    <div class="meta" style="margin-bottom:6px">
      <span style="text-transform:capitalize">${d.type}</span>
      &nbsp;·&nbsp; ${pdfLink}
    </div>
    <div class="citation" style="font-size:0.73rem;color:#8b949e;margin-bottom:10px;font-style:italic">
      ${meta.authors ? escapeHtml(meta.authors) + ". " : ""}
      ${meta.title   ? escapeHtml(meta.title) : ""}
    </div>
    <div class="statement">${escapeHtml(d.statement || "")}</div>
    ${badges}
    <div style="margin-top:10px;color:#8b949e;font-size:0.72rem">
      ${connected.size - 1} connected results
    </div>
  `;
  if (window.renderMathInElement) {
    renderMathInElement(detail.querySelector(".statement"), {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$",  right: "$",  display: false},
      ],
      throwOnError: false,
    });
  }
}

svg.on("click", e => {
  if (e.target === svg.node()) {
    selectedNode = null;
    node.classed("highlighted dimmed", false);
    link.classed("dimmed", false);
  }
});

// ── Search ─────────────────────────────────────────────────────────
function applySearch() {
  const q = searchQuery.toLowerCase();
  if (!q) { node.classed("dimmed", false); link.classed("dimmed", false); return; }
  const matched = new Set(
    GRAPH.nodes
      .filter(n =>
        (n.name      || "").toLowerCase().includes(q) ||
        (n.statement || "").toLowerCase().includes(q) ||
        (n.id        || "").toLowerCase().includes(q)
      )
      .map(n => n.id)
  );
  node.classed("dimmed", n => !matched.has(n.id));
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  applySearch();
});

// ── Filters ────────────────────────────────────────────────────────
function buildFilters(containerId, colorMap, activeSet) {
  const el = document.getElementById(containerId);
  Object.keys(colorMap).forEach(opt => {
    const btn = document.createElement("button");
    btn.className   = "filter-btn";
    btn.textContent = opt.replace(/_/g, " ");
    btn.style.borderColor = colorMap[opt];
    btn.style.color       = colorMap[opt];
    btn.addEventListener("click", () => {
      activeSet.has(opt) ? activeSet.delete(opt) : activeSet.add(opt);
      btn.classList.toggle("inactive", !activeSet.has(opt));
      render();
    });
    el.appendChild(btn);
  });
}

buildFilters("type-filters",     TYPE_COLORS,     activeTypes);
buildFilters("subfield-filters", SUBFIELD_COLORS, activeSubfields);

// ── Sidebar toggle ─────────────────────────────────────────────────
const sidebarEl = document.getElementById("sidebar");
const toggleBtn = document.getElementById("sidebar-toggle");
toggleBtn.addEventListener("click", () => {
  const collapsed = sidebarEl.classList.toggle("collapsed");
  toggleBtn.textContent = collapsed ? "▶" : "◀";
  toggleBtn.title = collapsed ? "Expand sidebar" : "Collapse sidebar";
});

// ── Stats + init ───────────────────────────────────────────────────
document.getElementById("stats").textContent =
  `${GRAPH.nodes.length} results · ${GRAPH.edges.length} connections`;

render();
</script>
</body>
